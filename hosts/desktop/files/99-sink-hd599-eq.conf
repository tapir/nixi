# ~/.config/pipewire/pipewire.conf.d/99-sink-hd599-eq.conf
#
# 10 band sink equalizer for Sennheiser HD599
# https://www.dropbox.com/scl/fi/xo3o8ge30qe23vat3ybd5/Sennheiser-HD599.pdf?rlkey=3u94biy0ewk8txko3lqs4tx0x

context.modules = [{
    name = libpipewire-module-filter-chain
    args = {
        node.description = "Oratory1990 HD599 EQ"
        media.name       = "Oratory1990 HD599 EQ"
        audio.channels = 2
        audio.position = [ FL FR ]
        capture.props = {
            node.name   = "effect_hd599_input.eq10"
            media.class = Audio/Filter
        }
        playback.props = {
            node.name    = "effect_hd599_output.eq10"
            node.passive = true
        }
        filter.graph = {
            nodes = [
                {
                    type  = builtin
                    name  = eq_band_1
                    label = bq_highshelf
                    control = { "Freq" = 33.0 "Q" = 0.8 "Gain" = 4.0 }
                }
                {
                    type  = builtin
                    name  = eq_band_2
                    label = bq_lowshelf
                    control = { "Freq" = 105.0 "Q" = 0.71 "Gain" = 5.5 }
                }
                {
                    type  = builtin
                    name  = eq_band_3
                    label = bq_peaking
                    control = { "Freq" = 165.0 "Q" = 0.45 "Gain" = -5.0 }
                }
                {
                    type  = builtin
                    name  = eq_band_4
                    label = bq_peaking
                    control = { "Freq" = 1150.0 "Q" = 1.4 "Gain" = -1.1 }
                }
                {
                    type  = builtin
                    name  = eq_band_5
                    label = bq_peaking
                    control = { "Freq" = 1700.0 "Q" = 1.5 "Gain" = 3.6 }
                }
                {
                    type  = builtin
                    name  = eq_band_6
                    label = bq_highshelf
                    control = { "Freq" = 3000.0 "Q" = 0.35 "Gain" = 1.0 }
                }
                {
                    type  = builtin
                    name  = eq_band_7
                    label = bq_peaking
                    control = { "Freq" = 3100.0 "Q" = 3.5 "Gain" = -2.6 }
                }
                {
                    type  = builtin
                    name  = eq_band_8
                    label = bq_peaking
                    control = { "Freq" = 4350.0 "Q" = 3.5 "Gain" = -2.6 }
                }
                {
                    type  = builtin
                    name  = eq_band_9
                    label = bq_peaking
                    control = { "Freq" = 5800.0 "Q" = 3.5 "Gain" = -3.0 }
                }
                {
                    type  = builtin
                    name  = eq_band_10
                    label = bq_highshelf
                    control = { "Freq" = 10000.0 "Q" = 0.71 "Gain" = 3.0 }
                }
            ]
            links = [
                { output = "eq_band_1:Out" input = "eq_band_2:In" }
                { output = "eq_band_2:Out" input = "eq_band_3:In" }
                { output = "eq_band_3:Out" input = "eq_band_4:In" }
                { output = "eq_band_4:Out" input = "eq_band_5:In" }
                { output = "eq_band_5:Out" input = "eq_band_6:In" }
                { output = "eq_band_6:Out" input = "eq_band_7:In" }
                { output = "eq_band_7:Out" input = "eq_band_8:In" }
                { output = "eq_band_8:Out" input = "eq_band_9:In" }
                { output = "eq_band_9:Out" input = "eq_band_10:In" }
            ]
        }
    }
}]